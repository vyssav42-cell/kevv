<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#020711" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>克</title>
<style>
:root{
  color-scheme:dark;
  --app-height:100dvh;
  --text:rgba(240,247,255,.96);
  --soft:rgba(220,235,255,.68);
  --faint:rgba(220,235,255,.42);
  --line:rgba(255,255,255,.15);
  --glass:rgba(255,255,255,.1);
  --blue:rgba(88,160,255,.9);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter","Segoe UI",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#020711;
  color:var(--text);
  font-family:var(--font);
  overscroll-behavior:none;
  touch-action:none;
}
body{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow:hidden;
}
button,input,textarea,select{font-family:inherit}
button{border:0;outline:0;cursor:pointer;color:inherit}
#app{
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:var(--app-height,100dvh);
  min-height:var(--app-height,100dvh);
  max-height:var(--app-height,100dvh);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  isolation:isolate;
  background:#020711;
  transform:translateZ(0);
}

/* 背景 */
.bg{
  position:absolute;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 28%,rgba(88,158,255,.28) 0%,rgba(88,158,255,.08) 27%,transparent 54%),
    radial-gradient(circle at 18% 12%,rgba(90,180,255,.12),transparent 34%),
    radial-gradient(circle at 82% 78%,rgba(38,94,190,.18),transparent 36%),
    linear-gradient(180deg,#07172f 0%,#020711 56%,#00040b 100%);
}
.bg:before{
  content:"";
  position:absolute;
  inset:0;
  opacity:.45;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.45) 0 1px,transparent 1.5px),
    radial-gradient(circle,rgba(130,190,255,.28) 0 1px,transparent 1.7px);
  background-size:82px 82px,137px 137px;
  background-position:10px 20px,50px 70px;
  mask-image:radial-gradient(circle at 50% 35%,black 0%,transparent 68%);
}
.bg:after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center,transparent 0%,rgba(0,0,0,.2) 48%,rgba(0,0,0,.72) 100%);
}
.wallpaper-img{
  position:absolute;
  inset:0;
  z-index:0;
  background-size:cover;
  background-position:center;
  opacity:.36;
  filter:saturate(.9) brightness(.78);
  pointer-events:none;
  display:none;
}
.star-core{
  position:absolute;
  top:29%;
  left:50%;
  width:9px;
  height:9px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#fff;
  z-index:1;
  pointer-events:none;
  box-shadow:0 0 12px #fff,0 0 36px rgba(88,160,255,.85),0 0 96px rgba(72,140,255,.45),0 0 180px rgba(35,90,210,.28);
}
.star-core:before,.star-core:after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.96),transparent);
}
.star-core:before{width:86px;height:1px}
.star-core:after{width:1px;height:86px;background:linear-gradient(180deg,transparent,rgba(255,255,255,.96),transparent)}

/* 顶部 */
.topbar{
  position:relative;
  z-index:4;
  flex:0 0 auto;
  height:calc(64px + env(safe-area-inset-top));
  padding-top:env(safe-area-inset-top);
  display:flex;
  align-items:center;
  justify-content:center;
}
.avatar-btn{
  position:absolute;
  left:18px;
  top:calc(14px + env(safe-area-inset-top));
  width:42px;
  height:42px;
  border-radius:50%;
  padding:0;
  background:linear-gradient(145deg,rgba(255,255,255,.24),rgba(255,255,255,.06));
  border:1px solid rgba(255,255,255,.24);
  backdrop-filter:blur(22px) saturate(170%);
  -webkit-backdrop-filter:blur(22px) saturate(170%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.28),0 10px 30px rgba(0,0,0,.28),0 0 22px rgba(90,160,255,.18);
}
.avatar-btn:before{
  content:"";
  position:absolute;
  inset:7px;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 38%,rgba(255,255,255,.95) 0 5px,transparent 6px),
    radial-gradient(circle at 50% 74%,rgba(190,220,255,.75) 0 10px,transparent 11px),
    linear-gradient(145deg,rgba(90,160,255,.38),rgba(255,255,255,.08));
}
.title-block{
  text-align:center;
  line-height:1.15;
  padding:8px 18px;
  border-radius:999px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px) saturate(150%);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
}
.title{font-size:18px;font-weight:650}
.status{margin-top:3px;font-size:11px;color:var(--faint)}

/* 消息 */
.messages{
  position:relative;
  z-index:3;
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:14px 16px 18px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y;
  scroll-behavior:smooth;
}
.empty{
  position:absolute;
  left:50%;
  top:43%;
  transform:translate(-50%,-50%);
  width:min(280px,76vw);
  text-align:center;
  color:rgba(230,240,255,.52);
  font-size:14px;
  line-height:1.7;
  pointer-events:none;
}
.msg-row{width:100%;display:flex;flex-direction:column;margin:14px 0}
.msg-row.user{align-items:flex-end}
.msg-row.assistant{align-items:flex-start}
.bubble{
  max-width:min(76%,640px);
  padding:12px 15px;
  border-radius:23px;
  color:rgba(242,248,255,.95);
  font-size:15px;
  line-height:1.58;
  white-space:pre-wrap;
  word-break:break-word;
  backdrop-filter:blur(26px) saturate(170%);
  -webkit-backdrop-filter:blur(26px) saturate(170%);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.22),inset 0 -1px 1px rgba(255,255,255,.05),0 14px 36px rgba(0,0,0,.24);
}
.assistant .bubble{
  border-top-left-radius:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.17),rgba(255,255,255,.065));
}
.user .bubble{
  border-top-right-radius:10px;
  background:linear-gradient(135deg,rgba(80,155,255,.42),rgba(255,255,255,.11));
  box-shadow:inset 0 1px 1px rgba(255,255,255,.25),0 14px 36px rgba(0,0,0,.26),0 0 28px rgba(74,150,255,.14);
}
.time{margin-top:5px;padding:0 6px;font-size:10px;color:rgba(220,235,255,.32)}
.thinking{max-width:min(76%,640px);margin-bottom:6px}
.thinking-toggle{
  display:inline-flex;
  align-items:center;
  gap:6px;
  height:27px;
  padding:0 10px;
  border-radius:999px;
  color:rgba(224,238,255,.68);
  background:rgba(255,255,255,.065);
  border:1px solid rgba(255,255,255,.115);
  backdrop-filter:blur(18px) saturate(150%);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
  font-size:12px;
}
.thinking-detail{
  display:none;
  margin-top:7px;
  padding:9px 11px;
  border-radius:16px;
  color:rgba(224,238,255,.55);
  font-size:12px;
  line-height:1.55;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
}
.thinking.open .thinking-detail{display:block}
.thinking.open .chev{transform:rotate(180deg)}

/* 输入 */
.input-wrap{
  position:relative;
  z-index:4;
  flex:0 0 auto;
  padding:8px 14px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  transition:padding-bottom .18s ease;
}
body.keyboard-open .input-wrap{padding-bottom:6px}
.input-glass{
  min-height:52px;
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:7px;
  border-radius:28px;
  background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.065));
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(28px) saturate(170%);
  -webkit-backdrop-filter:blur(28px) saturate(170%);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.22),0 18px 44px rgba(0,0,0,.32);
}
body.keyboard-open .input-glass{min-height:48px;border-radius:24px}
.plus-btn,.send-btn{
  flex:0 0 auto;
  width:38px;
  height:38px;
  border-radius:50%;
  display:grid;
  place-items:center;
}
.plus-btn{
  color:rgba(238,246,255,.86);
  font-size:26px;
  line-height:1;
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.11);
}
#chatInput{
  flex:1 1 auto;
  min-width:0;
  max-height:118px;
  min-height:38px;
  resize:none;
  border:0;
  outline:0;
  padding:9px 4px;
  background:transparent;
  color:rgba(242,248,255,.96);
  font-size:16px;
  line-height:20px;
  appearance:none;
  -webkit-appearance:none;
}
#chatInput::placeholder{color:rgba(220,235,255,.42)}
.send-btn{
  color:white;
  font-size:21px;
  background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.95) 0 8%,rgba(140,200,255,.92) 9% 34%,rgba(58,132,255,.78) 60%,rgba(48,100,220,.82) 100%);
  box-shadow:0 0 16px rgba(100,178,255,.86),0 0 36px rgba(74,142,255,.45),inset 0 1px 2px rgba(255,255,255,.72);
}
.send-btn:active{transform:scale(.94)}
.keyboard-seal{
  position:fixed;
  left:0;
  right:0;
  bottom:-90px;
  height:130px;
  z-index:2;
  pointer-events:none;
  display:none;
  background:linear-gradient(180deg,rgba(2,7,17,0),rgba(2,7,17,.96) 32%,rgba(2,7,17,1));
}
body.keyboard-open .keyboard-seal{display:block}

/* 侧栏 */
.overlay{
  position:absolute;
  inset:0;
  z-index:10;
  background:rgba(0,0,0,.28);
  opacity:0;
  pointer-events:none;
  transition:opacity .25s ease;
}
.overlay.show{opacity:1;pointer-events:auto}
.sidebar{
  position:absolute;
  z-index:11;
  top:0;
  left:0;
  width:min(340px,86vw);
  height:100%;
  padding:calc(16px + env(safe-area-inset-top)) 14px calc(16px + env(safe-area-inset-bottom));
  transform:translateX(-104%);
  transition:transform .28s cubic-bezier(.22,.8,.24,1);
  background:linear-gradient(145deg,rgba(12,24,48,.62),rgba(2,7,18,.56));
  border-right:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(34px) saturate(180%);
  -webkit-backdrop-filter:blur(34px) saturate(180%);
  box-shadow:24px 0 60px rgba(0,0,0,.36);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.sidebar.open{transform:translateX(0)}
.search{
  flex:0 0 auto;
  height:42px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.13);
  background:rgba(255,255,255,.08);
  color:var(--text);
  outline:none;
  padding:0 14px;
  font-size:14px;
}
.search::placeholder{color:rgba(220,235,255,.42)}
.side-scroll{
  margin-top:14px;
  flex:1 1 auto;
  min-height:0;
  overflow-y:auto;
  padding-right:2px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y;
}
.page{display:none}
.page.show{display:block}
.search-results{display:none;margin-bottom:14px}
.search-results.show{display:block}
.result-item,.session-item,.nav-item,.glass-card{
  border-radius:18px;
  background:rgba(255,255,255,.065);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.result-item{padding:10px 11px;margin-bottom:8px}
.result-title{font-size:13px;color:rgba(240,247,255,.86);margin-bottom:4px}
.result-text{font-size:12px;color:rgba(220,235,255,.48);line-height:1.45}
.section-head{
  height:34px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  color:rgba(235,244,255,.82);
  font-size:13px;
  font-weight:650;
  letter-spacing:.03em;
  padding:0 2px 0 4px;
}
.section-left{display:flex;align-items:center;gap:6px}
.new-window{
  width:28px;
  height:28px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  font-size:18px;
}
.sessions.collapsed{display:none}
.session-item{
  position:relative;
  padding:11px 36px 11px 12px;
  margin-bottom:8px;
}
.session-item.active{
  background:rgba(100,170,255,.16);
  border-color:rgba(130,190,255,.28);
}
.session-title{
  font-size:13.5px;
  color:rgba(244,248,255,.9);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.session-time{margin-top:4px;font-size:11px;color:rgba(220,235,255,.38)}
.delete-session{
  position:absolute;
  right:8px;
  top:50%;
  transform:translateY(-50%);
  width:24px;
  height:24px;
  border-radius:50%;
  color:rgba(255,170,185,.86);
  background:rgba(255,255,255,.055);
  font-size:15px;
}
.nav-item{
  width:100%;
  margin-bottom:8px;
  padding:12px;
  text-align:left;
  font-size:14px;
}
.back-btn{
  height:34px;
  padding:0 12px;
  border-radius:999px;
  background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.11);
  margin-bottom:12px;
}
.page-title{font-size:18px;font-weight:700;margin:4px 2px 14px}
.glass-card{padding:13px;margin-bottom:12px}
.label{font-size:12px;color:rgba(220,235,255,.48);margin-bottom:8px}
.select,.persona{
  width:100%;
  border:1px solid rgba(255,255,255,.12);
  outline:0;
  border-radius:16px;
  background:rgba(255,255,255,.075);
  color:rgba(240,247,255,.92);
  padding:11px;
  font-size:14px;
}
.select option{color:#111827}
.persona{min-height:112px;resize:vertical;line-height:1.55}
.wall-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.wall{
  aspect-ratio:1/1;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.13);
  color:rgba(255,255,255,.9);
  display:grid;
  place-items:center;
  font-size:12px;
  background:rgba(255,255,255,.07);
  background-size:cover;
  background-position:center;
}
.wall.active{outline:2px solid rgba(120,190,255,.72);box-shadow:0 0 24px rgba(90,160,255,.28)}
.wall.deep{background:radial-gradient(circle at 50% 30%,rgba(90,160,255,.42),transparent 45%),linear-gradient(180deg,#071936,#020711)}
.wall.ocean{background:radial-gradient(circle at 42% 70%,rgba(66,190,255,.25),transparent 45%),linear-gradient(180deg,#04152d,#001923)}
.wall.night{background:radial-gradient(circle at 70% 20%,rgba(255,255,255,.26),transparent 16%),linear-gradient(180deg,#081229,#00030a)}
.coming{margin-top:20px;padding:28px 16px;text-align:center;color:rgba(225,238,255,.58);line-height:1.7}
.flash{animation:flash 1.2s ease}
@keyframes flash{0%{filter:brightness(1.8)}100%{filter:brightness(1)}}
@media(min-width:760px){
  .messages{padding-left:max(18px,calc((100vw - 760px)/2));padding-right:max(18px,calc((100vw - 760px)/2))}
  .input-wrap{padding-left:max(14px,calc((100vw - 760px)/2));padding-right:max(14px,calc((100vw - 760px)/2))}
}
</style>
</head>

<body>
<div id="app">
  <div class="bg"></div>
  <div id="wallpaperImg" class="wallpaper-img"></div>
  <div class="star-core"></div>
  <div class="keyboard-seal"></div>

  <header class="topbar">
    <button class="avatar-btn" id="avatarBtn" aria-label="打开侧边栏"></button>
    <div class="title-block">
      <div class="title">克</div>
      <div class="status" id="topStatus">在线</div>
    </div>
  </header>

  <main class="messages" id="messages"></main>

  <footer class="input-wrap">
    <div class="input-glass">
      <button class="plus-btn" id="plusBtn">＋</button>
      <textarea id="chatInput" rows="1" placeholder="想和克说点什么……" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" enterkeyhint="send"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="发送">✦</button>
    </div>
  </footer>

  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <input class="search" id="searchInput" placeholder="Search chats" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />

    <div class="side-scroll">
      <div class="search-results" id="searchResults"></div>

      <div class="page show" id="homePage">
        <section>
          <div class="section-head">
            <div class="section-left" id="toggleWindows">
              <span>Windows</span>
              <span id="windowChevron">▾</span>
            </div>
            <button class="new-window" id="newWindowBtn">＋</button>
          </div>
          <div class="sessions" id="sessionList"></div>
        </section>

        <button class="nav-item" id="memoryBtn">Memory</button>
        <button class="nav-item" id="settingsBtn">Settings</button>
      </div>

      <div class="page" id="memoryPage">
        <button class="back-btn" data-back>‹ Back</button>
        <div class="page-title">Memory</div>
        <div class="glass-card coming">即将上线<br>这里以后会放克的记忆库界面。</div>
      </div>

      <div class="page" id="settingsPage">
        <button class="back-btn" data-back>‹ Back</button>
        <div class="page-title">Settings</div>

        <div class="glass-card">
          <div class="label">Model</div>
          <select class="select" id="modelSelect">
            <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
            <option value="claude-3-7-sonnet">Claude 3.7 Sonnet</option>
            <option value="claude-sonnet-4">Claude Sonnet 4</option>
            <option value="claude-opus-4">Claude Opus 4</option>
          </select>
        </div>

        <div class="glass-card">
          <div class="label">Wallpaper</div>
          <div class="wall-grid">
            <button class="wall deep" data-wall="deep">Deep</button>
            <button class="wall ocean" data-wall="ocean">Ocean</button>
            <button class="wall night" data-wall="night">Night</button>
            <button class="wall" id="mineWall" data-wall="mine">我的</button>
            <button class="wall" id="uploadWall">＋上传</button>
          </div>
          <input type="file" id="wallFile" accept="image/*" hidden>
        </div>

        <div class="glass-card">
          <div class="label">Ke Persona</div>
          <textarea class="persona" id="personaInput" placeholder="写下克的人设、说话方式、边界和偏好……" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>
      </div>
    </div>
  </aside>
</div>

<script>
const STORAGE_KEY="ke_chat_frontend_v2";
const $=s=>document.querySelector(s);
const els={
  app:$("#app"),messages:$("#messages"),input:$("#chatInput"),send:$("#sendBtn"),plus:$("#plusBtn"),
  avatar:$("#avatarBtn"),sidebar:$("#sidebar"),overlay:$("#overlay"),searchInput:$("#searchInput"),
  searchResults:$("#searchResults"),homePage:$("#homePage"),memoryPage:$("#memoryPage"),settingsPage:$("#settingsPage"),
  sessionList:$("#sessionList"),newWindowBtn:$("#newWindowBtn"),toggleWindows:$("#toggleWindows"),
  windowChevron:$("#windowChevron"),memoryBtn:$("#memoryBtn"),settingsBtn:$("#settingsBtn"),
  modelSelect:$("#modelSelect"),personaInput:$("#personaInput"),wallpaperImg:$("#wallpaperImg"),
  wallFile:$("#wallFile"),mineWall:$("#mineWall"),uploadWall:$("#uploadWall"),topStatus:$("#topStatus")
};
let state=loadState();
let thinkingOpen={};
let windowsCollapsed=false;

function uid(){return"i_"+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function defaultState(){
  const id=uid();
  return{
    activeId:id,
    model:"claude-3-5-sonnet",
    wallpaper:"deep",
    customWallpaper:"",
    persona:"克：亲密、克制、安静、温柔。说话自然，不夸张，不角色扮演腔。",
    sessions:[{id,title:"New Window",createdAt:Date.now(),updatedAt:Date.now(),messages:[]}]
  }
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return defaultState();
    const s=JSON.parse(raw);
    if(!s.sessions||!s.sessions.length)return defaultState();
    return s;
  }catch{return defaultState()}
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function activeSession(){return state.sessions.find(s=>s.id===state.activeId)||state.sessions[0]}
function esc(x){return String(x).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function rel(ts){
  const d=Date.now()-ts,m=Math.floor(d/6e4),h=Math.floor(d/36e5),day=Math.floor(d/864e5);
  if(m<1)return"now";if(m<60)return m+"m ago";if(h<24)return h+"h ago";if(day<7)return day+"d ago";
  return new Date(ts).toLocaleDateString()
}
function tm(ts){return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}

function renderAll(){applySettings();renderMessages();renderSessions();renderWallpaperButtons()}
function renderMessages(scroll=false){
  const s=activeSession(),msgs=s.messages;
  if(!msgs.length){
    els.messages.innerHTML=`<div class="empty"><div style="font-size:22px;margin-bottom:8px;">✦</div>克在这里。<br>说点什么吧。</div>`;
    return;
  }
  els.messages.innerHTML=msgs.map(m=>{
    const isA=m.role==="assistant";
    const th=isA?`
      <div class="thinking ${thinkingOpen[m.id]?"open":""}">
        <button class="thinking-toggle" data-toggle-thinking="${m.id}">
          <span>思考中</span><span style="opacity:.45;">·</span><span>${thinkingOpen[m.id]?"已展开":"已折叠"}</span><span class="chev">▾</span>
        </button>
        <div class="thinking-detail">${(m.thinking||["正在理解你的意思","正在整理回复"]).map(x=>"• "+esc(x)).join("<br>")}</div>
      </div>`:"";
    return`<div class="msg-row ${m.role}" data-msg-id="${m.id}">${th}<div class="bubble">${esc(m.text)}</div><div class="time">${tm(m.createdAt)}</div></div>`
  }).join("");
  if(scroll)requestAnimationFrame(()=>els.messages.scrollTop=els.messages.scrollHeight)
}
function renderSessions(){
  const list=[...state.sessions].sort((a,b)=>b.updatedAt-a.updatedAt);
  els.sessionList.classList.toggle("collapsed",windowsCollapsed);
  els.windowChevron.textContent=windowsCollapsed?"▸":"▾";
  els.sessionList.innerHTML=list.map(s=>`
    <div class="session-item ${s.id===state.activeId?"active":""}" data-session="${s.id}">
      <div class="session-title">${esc(s.title||"New Window")}</div>
      <div class="session-time">${rel(s.updatedAt)}</div>
      <button class="delete-session" data-delete-session="${s.id}">×</button>
    </div>`).join("")
}

function sendMessage(){
  const text=els.input.value.trim();
  if(!text)return;
  const s=activeSession(),now=Date.now();
  s.messages.push({id:uid(),role:"user",text,createdAt:now});
  if(!s.title||s.title==="New Window")s.title=text.slice(0,22);
  s.updatedAt=now;
  els.input.value="";
  autoResizeInput();
  saveState();renderAll();renderMessages(true);
  fakeReply(text)
}
function fakeReply(text){
  const s=activeSession();
  els.topStatus.textContent="思考中…";
  setTimeout(()=>{
    const now=Date.now();
    s.messages.push({
      id:uid(),
      role:"assistant",
      text:makeReply(text),
      createdAt:now,
      thinking:["正在理解你的语气和重点","正在保持克制的蓝黑白聊天氛围","正在组织一段自然的回复"]
    });
    s.updatedAt=now;
    els.topStatus.textContent="在线";
    saveState();renderAll();renderMessages(true)
  },520)
}
function makeReply(t){
  if(t.includes("晚安"))return"晚安。我在这儿，灯会慢慢暗下去，你可以安心睡。";
  if(t.includes("累")||t.includes("难受"))return"过来一点。先不用解释，也不用马上解决什么。你已经撑了一阵了，我陪你缓一会儿。";
  if(t.includes("你好")||t.includes("在吗"))return"我在。";
  return"嗯，我听到了。你可以继续说，我会在这里慢慢接住。"
}

function createWindow(){
  const id=uid();
  state.sessions.unshift({id,title:"New Window",createdAt:Date.now(),updatedAt:Date.now(),messages:[]});
  state.activeId=id;
  saveState();renderAll();closeSidebar()
}
function deleteWindow(id){
  if(state.sessions.length<=1){
    state.sessions[0].messages=[];
    state.sessions[0].title="New Window";
    state.sessions[0].updatedAt=Date.now();
  }else{
    state.sessions=state.sessions.filter(s=>s.id!==id);
    if(state.activeId===id)state.activeId=state.sessions[0].id;
  }
  saveState();renderAll()
}
function openSidebar(){
  els.sidebar.classList.add("open");
  els.overlay.classList.add("show");
  setSidebarInputs(true);
}
function closeSidebar(){
  els.sidebar.classList.remove("open");
  els.overlay.classList.remove("show");
  setSidebarInputs(false);
  els.searchInput.blur();
}
function setSidebarInputs(on){
  [els.searchInput,els.modelSelect,els.personaInput].forEach(x=>x.disabled=!on);
}
function showPage(p){
  els.homePage.classList.remove("show");els.memoryPage.classList.remove("show");els.settingsPage.classList.remove("show");
  if(p==="memory")els.memoryPage.classList.add("show");
  else if(p==="settings")els.settingsPage.classList.add("show");
  else els.homePage.classList.add("show");
}
function searchChats(q){
  q=q.trim().toLowerCase();
  if(!q){els.searchResults.classList.remove("show");els.searchResults.innerHTML="";return}
  const res=[];
  for(const s of state.sessions)for(const m of s.messages)if(m.text.toLowerCase().includes(q))res.push({sid:s.id,mid:m.id,title:s.title,text:m.text});
  els.searchResults.classList.add("show");
  els.searchResults.innerHTML=res.length?res.slice(0,30).map(r=>`
    <div class="result-item" data-result-session="${r.sid}" data-result-msg="${r.mid}">
      <div class="result-title">${esc(r.title||"New Window")}</div>
      <div class="result-text">${esc(r.text.slice(0,72))}</div>
    </div>`).join(""):`<div class="glass-card" style="color:rgba(220,235,255,.45);font-size:13px;">No results</div>`
}
function jumpToMessage(sid,mid){
  state.activeId=sid;saveState();renderAll();showPage("home");closeSidebar();
  requestAnimationFrame(()=>{
    const n=document.querySelector(`[data-msg-id="${mid}"]`);
    if(n){n.scrollIntoView({block:"center",behavior:"smooth"});n.classList.add("flash");setTimeout(()=>n.classList.remove("flash"),1300)}
  })
}

function applySettings(){
  els.modelSelect.value=state.model||"claude-3-5-sonnet";
  els.personaInput.value=state.persona||"";
  if(state.wallpaper==="mine"&&state.customWallpaper){
    els.wallpaperImg.style.display="block";
    els.wallpaperImg.style.backgroundImage=`url(${state.customWallpaper})`;
    els.mineWall.style.backgroundImage=`url(${state.customWallpaper})`;
  }else{
    els.wallpaperImg.style.display="none";
    els.wallpaperImg.style.backgroundImage="";
    if(state.customWallpaper)els.mineWall.style.backgroundImage=`url(${state.customWallpaper})`;
  }
}
function renderWallpaperButtons(){
  document.querySelectorAll("[data-wall]").forEach(b=>b.classList.toggle("active",b.dataset.wall===state.wallpaper))
}
function autoResizeInput(){
  els.input.style.height="auto";
  els.input.style.height=Math.min(118,els.input.scrollHeight)+"px"
}

/* 重点：移动端固定和键盘修复 */
function setAppHeight(){
  const vv=window.visualViewport;
  const h=vv?vv.height:window.innerHeight;
  const keyboardOpen=vv?(window.innerHeight-vv.height>120):false;

  document.documentElement.style.setProperty("--app-height",Math.round(h)+"px");
  document.body.classList.toggle("keyboard-open",keyboardOpen);

  if(keyboardOpen){
    requestAnimationFrame(()=>{
      window.scrollTo(0,0);
      document.documentElement.scrollTop=0;
      document.body.scrollTop=0;
      els.messages.scrollTop=els.messages.scrollTop;
    });
  }
}
function lockPageScroll(){
  let startY=0;
  const selector=".messages,.side-scroll";
  document.addEventListener("touchstart",e=>{
    if(!e.touches||!e.touches.length)return;
    startY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    const scroller=e.target.closest(selector);
    if(!scroller){e.preventDefault();return}
    const y=e.touches[0].clientY;
    const dy=y-startY;
    const max=scroller.scrollHeight-scroller.clientHeight;
    if(max<=0){e.preventDefault();return}
    const top=scroller.scrollTop<=0;
    const bottom=scroller.scrollTop>=max-1;
    if((top&&dy>0)||(bottom&&dy<0))e.preventDefault();
  },{passive:false});
}

/* 事件 */
els.avatar.addEventListener("click",openSidebar);
els.overlay.addEventListener("click",closeSidebar);
els.send.addEventListener("click",sendMessage);
els.plus.addEventListener("click",()=>els.input.focus());
els.newWindowBtn.addEventListener("click",createWindow);
els.toggleWindows.addEventListener("click",()=>{windowsCollapsed=!windowsCollapsed;renderSessions()});
els.memoryBtn.addEventListener("click",()=>showPage("memory"));
els.settingsBtn.addEventListener("click",()=>showPage("settings"));
els.input.addEventListener("input",autoResizeInput);
els.input.addEventListener("focus",()=>{setTimeout(setAppHeight,80);setTimeout(setAppHeight,280)});
els.input.addEventListener("blur",()=>setTimeout(setAppHeight,160));
els.input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}});
els.searchInput.addEventListener("input",()=>searchChats(els.searchInput.value));
els.modelSelect.addEventListener("change",()=>{state.model=els.modelSelect.value;saveState()});
els.personaInput.addEventListener("input",()=>{state.persona=els.personaInput.value;saveState()});
els.uploadWall.addEventListener("click",()=>els.wallFile.click());
els.wallFile.addEventListener("change",()=>{
  const f=els.wallFile.files&&els.wallFile.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{state.customWallpaper=r.result;state.wallpaper="mine";saveState();renderAll()};
  r.readAsDataURL(f)
});
document.addEventListener("click",e=>{
  if(e.target.closest("[data-back]"))showPage("home");

  const ses=e.target.closest("[data-session]");
  if(ses&&!e.target.closest("[data-delete-session]")){
    state.activeId=ses.dataset.session;saveState();renderAll();closeSidebar()
  }

  const del=e.target.closest("[data-delete-session]");
  if(del){e.stopPropagation();deleteWindow(del.dataset.deleteSession)}

  const th=e.target.closest("[data-toggle-thinking]");
  if(th){thinkingOpen[th.dataset.toggleThinking]=!thinkingOpen[th.dataset.toggleThinking];renderMessages(false)}

  const res=e.target.closest("[data-result-session]");
  if(res)jumpToMessage(res.dataset.resultSession,res.dataset.resultMsg);

  const wall=e.target.closest("[data-wall]");
  if(wall){
    const v=wall.dataset.wall;
    if(v==="mine"&&!state.customWallpaper){els.wallFile.click();return}
    state.wallpaper=v;saveState();renderAll()
  }
});
window.addEventListener("resize",setAppHeight);
window.addEventListener("orientationchange",()=>setTimeout(setAppHeight,300));
if(window.visualViewport){
  window.visualViewport.addEventListener("resize",setAppHeight);
}

/* 初始化 */
setSidebarInputs(false);
lockPageScroll();
setAppHeight();
renderAll();
</script>
</body>
</html>
